[[rule]]
id = "rpe.time.bpmfactor-ignore"
version = "1.0.0"
contract = "within each BPM segment chartTimeDeltaSeconds = sourceBeatDelta * 60 / BPMListBpm; raw bpmfactor remains provenance and does not affect runtime"
content_sha256 = "5c386895968a4c5f9391ea5229a9f3ecd4b47592a8b767be0997180621b8f6e1"

