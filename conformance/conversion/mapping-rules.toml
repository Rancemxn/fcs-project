schema_version = 1
conversion_specification_version = "1.0.0"
hash_algorithm = "sha256-utf8-contract"

[[rule]]
id = "pgr.time.source-line-beat-t32"
version = "1.0.0"
contract = "sourceLineBeat = exactDecimal(T) / 32; this value is source provenance and is not canonical chartBeat"
content_sha256 = "e64ad0e59d1f2d740b991876a74444f4b65a26a203fd750231686cb1270b3da1"

[[rule]]
id = "pgr.time.per-line-bpm"
version = "1.0.0"
contract = "chartTimeSeconds = exactDecimal(T) * 60 / (32 * currentLineBpm); currentLineBpm must be finite and positive"
content_sha256 = "54229ca39c92b13e41cbc6b6185e2fe1788be065785967793da446ac9d4b810e"

[[rule]]
id = "pgr.time.first-line-bpm"
version = "1.0.0"
contract = "chartTimeSeconds = exactDecimal(T) * 60 / (32 * firstLineBpm) for every line; firstLineBpm must be finite and positive"
content_sha256 = "85714bf2812202620b4ffc2fbaaee267ed6cb12d5b3e35ff11a9a6dbd4491ec7"

[[rule]]
id = "pgr.tempo.per-line-canonical-anchor"
version = "1.0.0"
contract = "if all positive line BPM values are equal use that common BPM as canonical global tempo; otherwise use trusted declared global tempo or generate 0beat to 60bpm and report conversion.generated-canonical-tempo"
content_sha256 = "9711f111c2477f7c50b2750f48496ba8207f9417c5bf8c51eeab7598d3204694"

[[rule]]
id = "pgr.tempo.first-line-anchor"
version = "1.0.0"
contract = "use the first judge-line positive finite BPM as the canonical global tempo for a first-line compatibility profile"
content_sha256 = "b6ee066d5ef3bb8c944cec05bf809aa24eb65c8290168c89eca4be468035f56a"

[[rule]]
