content_sha256 = "26b06c894bb72bcae6b050e6a3e9df94df2dd2c40ba2add7f8cd333b716408ea"

[[rule]]
id = "rpe.time.bpmfactor-divide"
version = "1.0.0"
contract = "effectiveBpm = BPMListBpm / positiveFinite(bpmfactor); within each BPM segment chartTimeDeltaSeconds = sourceBeatDelta * 60 * bpmfactor / BPMListBpm"
