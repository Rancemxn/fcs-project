contract = [
  "Raw bpmfactor is ignored but retained as provenance; all Beat-timed values use BPMList directly.",
  "Event layers add in ascending layer index; absent rotateWithFather means false.",
  "With useRpe170Speed enabled, explicit RPEVersion below 170 uses derivative speed semantics and version at least 170 eases speed directly before integration.",
  "A parser-invented default RPEVersion cannot select the branch; an explicit binding parameter is required when source evidence is absent.",
  "Any nonzero isFake is fake; custom hitsound and texture paths resolve from the declared package resource root.",
  "Note visibleTime, alpha, size and yOffset follow the pinned Phira presentation rules rather than documentation defaults.",
]
known_limitations = [
  "Ignoring non-unit bpmfactor is a runtime interpretation, not evidence that the source field is meaningless.",
]
report_categories = ["conversion.ignored-source-semantic-field", "conversion.runtime-option-bound"]
